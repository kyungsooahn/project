<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시험 학습 모드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div style="text-align: left;">
                <h1 id="exam-title" style="font-size: 1.2rem; margin: 0;">시험 로딩중...</h1>
                <small id="section-title" style="color: var(--secondary);"></small>
            </div>
            <a href="index.html" style="text-decoration: none; font-size: 1.5rem;">🏠</a>
        </header>

        <div id="quiz-container">
            <div class="quiz-header">
                <span id="q-number">문제 로딩중...</span>
                <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            </div>

            <h2 id="question-text" style="margin-bottom: 2rem; line-height: 1.4; font-size: 1.1rem;">질문 내용</h2>

            <div id="options-container"></div>

            <div class="explanation" id="explanation-box">
                <strong style="display: block; margin-bottom: 0.5rem; color: var(--primary);">💡 정답 및 해설</strong>
                <p id="explanation-text"></p>
            </div>

            <div class="nav-btns">
                <button class="primary" id="next-btn" onclick="nextQuestion()" style="display: none;">다음 문제</button>
            </div>
        </div>

        <div id="result-container" style="display: none; text-align: center;">
            <h2>🎉 섹션 학습 완료!</h2>
            <p id="final-score" style="font-size: 1.5rem; margin: 2rem 0;"></p>
            <div style="display: flex; gap: 1rem;">
                <button class="primary" onclick="location.reload()">다시 풀기</button>
                <button class="primary" onclick="location.href='index.html'" style="background: var(--secondary);">메인으로</button>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const examKey = urlParams.get('exam');
        const sectionId = urlParams.get('section');

        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let answered = false;

        function init() {
            const examData = window.examData[examKey];
            if (!examData) {
                alert('잘못된 접근입니다.');
                location.href = 'index.html';
                return;
            }

            document.getElementById('exam-title').textContent = examData.title;

            if (sectionId === 'all') {
                document.getElementById('section-title').textContent = "전체 랜덤 1000제";
                // 모든 섹션의 문제 통합 및 셔플
                examData.sections.forEach(s => questions.push(...s.questions));
                shuffleArray(questions);
            } else {
                const section = examData.sections.find(s => s.id === sectionId);
                if (!section) {
                    alert('섹션 정보를 찾을 수 없습니다.');
                    location.href = 'index.html';
                    return;
                }
                document.getElementById('section-title').textContent = section.name;
                questions = [...section.questions];
                shuffleArray(questions); // 섹션 내에서도 랜덤하게
            }

            showQuestion();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function showQuestion() {
            answered = false;
            const q = questions[currentIdx];
            document.getElementById('q-number').textContent = `문제 ${currentIdx + 1}/${questions.length}`;
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            const progress = ((currentIdx) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${i + 1}. ${opt}`;
                btn.onclick = () => checkAnswer(i);
                container.appendChild(btn);
            });
        }

        function saveWrongQuestion(q) {
            const WRONG_KEY = 'wrong_questions';
            let wrongQuestions = JSON.parse(localStorage.getItem(WRONG_KEY) || '[]');
            
            // 현재 섹션 정보 가져오기
            const examData = window.examData[examKey];
            const section = examData.sections.find(s => s.id === sectionId) || { name: '전체 랜덤', id: 'all' };

            // 중복 체크 (질문 텍스트 기준)
            if (!wrongQuestions.some(item => item.q === q.q)) {
                wrongQuestions.push({
                    ...q,
                    examKey: examKey,
                    examTitle: examData.title,
                    sectionId: section.id,
                    sectionName: section.name,
                    savedAt: new Date().toISOString()
                });
                localStorage.setItem(WRONG_KEY, JSON.stringify(wrongQuestions));
            }
        }

        function saveProgress(isCorrect) {
            if (!isCorrect) return;
            
            const PROGRESS_KEY = 'progress_data';
            let progress = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
            const key = `${examKey}_${sectionId}`;
            
            // 이전에 이 문제를 맞힌 적이 있는지 추적하려면 더 복잡한 구조가 필요하지만,
            // 간단하게 정답 수를 누적하는 방식으로 구현 (실제 서비스에서는 문제 ID별 정답 여부 저장 권장)
            if (!progress[key]) progress[key] = 0;
            progress[key] += 1;
            
            localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
        }

        function checkAnswer(idx) {
            if (answered) return;
            answered = true;

            const q = questions[currentIdx];
            const buttons = document.querySelectorAll('.option-btn');
            
            if (idx === q.answer) {
                buttons[idx].classList.add('correct');
                score++;
                saveProgress(true); // 정답 저장
            } else {
                buttons[idx].classList.add('wrong');
                buttons[q.answer].classList.add('correct');
                saveWrongQuestion(q); // 오답 저장
            }

            document.getElementById('explanation-text').textContent = q.exp;
            document.getElementById('explanation-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('final-score').textContent = 
                `총 ${questions.length}문제 중 ${score}문제를 맞혔습니다!`;
        }

        init();
    </script>
</body>
</html>
