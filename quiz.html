    <style>
        .timer-badge {
            font-size: 0.8rem;
            background: rgba(0,0,0,0.05);
            padding: 2px 8px;
            border-radius: 10px;
            font-family: monospace;
        }
        [data-theme="dark"] .timer-badge {
            background: rgba(255,255,255,0.1);
        }
        .shortcut-hint {
            font-size: 0.7rem;
            opacity: 0.5;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="text-align: left;">
                <h1 id="exam-title" style="font-size: 1.2rem; margin: 0;">시험 로딩중...</h1>
                <small id="section-title" style="color: var(--secondary);"></small>
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <span id="timer-display" class="timer-badge">00:00</span>
                <div style="display: flex; flex-direction: column;"><a href="index.html" class="lite-logo">LI<span>TE</span></a><div class="lite-tagline">License Is Talent</div></div>
            </div>
        </header>

        <div id="quiz-container">
            <div class="quiz-header">
                <span id="q-number" style="font-weight: 600;">문제 로딩중...</span>
                <div style="display: flex; gap: 0.75rem; align-items: center; flex: 1; justify-content: flex-end;">
                    <button id="bookmark-btn" onclick="toggleBookmark()" class="theme-toggle" title="즐겨찾기" style="background: none; border: 1px solid #ddd; font-size: 1.2rem; padding: 2px 8px;">☆</button>
                    <div class="progress-bar" style="flex: 1; max-width: 200px; margin: 0;"><div class="progress-fill" id="progress"></div></div>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; gap: 1rem;">
                <h2 id="question-text" style="margin: 0; line-height: 1.5; font-size: 1.15rem; word-break: keep-all; flex: 1;">질문 내용</h2>
                <button onclick="readCurrentQuestion()" class="theme-toggle" title="음성으로 듣기" style="background: none; border: 1px solid #ddd; padding: 5px 10px; font-size: 1rem;">🔊</button>
            </div>

            <div id="options-container"></div>

            <div class="explanation" id="explanation-box">
                <strong style="display: block; margin-bottom: 0.5rem; color: var(--primary);">💡 정답 및 해설</strong>
                <p id="explanation-text"></p>
            </div>

            <div class="nav-btns">
                <button class="primary" id="next-btn" onclick="nextQuestion()" style="display: none;">다음 문제 (Enter)</button>
            </div>
        </div>

        <div id="result-container" style="display: none; text-align: center; padding: 3rem 1rem;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🏁</div>
            <h2>학습 완료!</h2>
            <div style="background: var(--card); padding: 2rem; border-radius: 1rem; margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <p id="final-score" style="font-size: 1.4rem; font-weight: bold; color: var(--primary); margin-bottom: 1rem;"></p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; text-align: center; font-size: 0.9rem; color: var(--secondary);">
                    <div>
                        <small>총 소요 시간</small>
                        <div id="total-time-result" style="font-size: 1.2rem; font-weight: bold; color: var(--text);">00:00</div>
                    </div>
                    <div>
                        <small>문항당 평균</small>
                        <div id="avg-time-result" style="font-size: 1.2rem; font-weight: bold; color: var(--text);">0초</div>
                    </div>
                </div>
            </div>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="primary" onclick="location.href='index.html'" style="background: var(--secondary);">메인으로</button>
                <button class="primary" onclick="location.reload()">다시 풀기</button>
            </div>
        </div>

        <footer>
            <div class="footer-links">
                <a href="about.html">서비스 소개</a>
                <a href="privacy.html">개인정보처리방침</a>
                <a href="solved.html">맞춘 문제</a>
                <a href="review.html">오답 노트</a>
                <a href="contact.html">문의하기</a>
            </div>
            <p>&copy; 2026 LITE. All rights reserved.</p>
        </footer>
    </div>

    <script src="data/cim.js"></script>
    <script src="data/fia.js"></script>
    <script src="data/crea1.js"></script>
    <script src="data/crea2.js"></script>
    <script>
        const WRONG_KEY = 'wrong_questions';
        const SOLVED_KEY = 'solved_questions';
        const PROGRESS_KEY = 'progress_data';
        const BOOKMARK_KEY = 'bookmarked_questions';

        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let answered = false;
        let examKey = '';
        let sectionId = '';
        
        // Timer & Shuffling
        let startTime = 0;
        let totalElapsed = 0;
        let timerInterval;
        let shuffledOptions = [];
        let correctOptionIdx = -1;

        window.onload = () => {
            const params = new URLSearchParams(location.search);
            examKey = params.get('exam');
            sectionId = params.get('section');

            if (!examKey || !window.examData[examKey]) {
                alert('잘못된 접근입니다.');
                location.href = 'index.html';
                return;
            }

            const examData = window.examData[examKey];
            document.getElementById('exam-title').textContent = examData.title;

            let rawQuestions = [];
            if (sectionId === 'all') {
                document.getElementById('section-title').textContent = "전체 랜덤 학습";
                examData.sections.forEach(s => rawQuestions.push(...s.questions.map(q => ({...q, sectionId: s.id, sectionName: s.name}))));
            } else {
                const section = examData.sections.find(s => s.id === sectionId);
                if (!section) {
                    alert('섹션 정보를 찾을 수 없습니다.');
                    location.href = 'index.html';
                    return;
                }
                document.getElementById('section-title').textContent = section.name;
                rawQuestions = section.questions.map(q => ({...q, sectionId: section.id, sectionName: section.name}));
            }

            const solvedQuestions = JSON.parse(localStorage.getItem(SOLVED_KEY) || '[]');
            const wrongQuestions = JSON.parse(localStorage.getItem(WRONG_KEY) || '[]');
            
            questions = rawQuestions.filter(q => {
                const isSolved = solvedQuestions.some(sq => sq.examKey === examKey && sq.q === q.q);
                const isWrong = wrongQuestions.some(wq => wq.examKey === examKey && wq.q === q.q);
                return !isSolved && !isWrong;
            });

            if (questions.length === 0) {
                if (rawQuestions.length > 0) {
                    alert('해당 섹션의 모든 문제를 학습했습니다!');
                } else {
                    alert('문제가 없습니다.');
                }
                location.href = 'index.html';
                return;
            }

            shuffleArray(questions);
            startTimer();
            showQuestion();
            
            // Add Keyboard Shortcuts
            window.addEventListener('keydown', handleKeyPress);
        };

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                totalElapsed = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer-display').textContent = formatTime(totalElapsed);
            }, 1000);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function handleKeyPress(e) {
            if (document.getElementById('result-container').style.display === 'block') return;
            
            if (!answered) {
                if (e.key >= '1' && e.key <= '4') {
                    checkAnswer(parseInt(e.key) - 1);
                }
            } else {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    nextQuestion();
                }
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function updateBookmarkUI() {
            const bookmarks = JSON.parse(localStorage.getItem(BOOKMARK_KEY) || '[]');
            const currentQ = questions[currentIdx];
            const isBookmarked = bookmarks.some(b => b.q === currentQ.q && b.examKey === examKey);
            const btn = document.getElementById('bookmark-btn');
            if (btn) {
                btn.innerText = isBookmarked ? '⭐' : '☆';
                btn.style.borderColor = isBookmarked ? 'var(--primary)' : '#ddd';
            }
        }

        async function toggleBookmark() {
            let bookmarks = JSON.parse(localStorage.getItem(BOOKMARK_KEY) || '[]');
            const currentQ = questions[currentIdx];
            const foundIdx = bookmarks.findIndex(b => b.examKey === examKey && b.q === currentQ.q);

            const user = await window.checkUser();

            if (foundIdx > -1) {
                bookmarks.splice(foundIdx, 1);
                if (user && window.supabaseClient) {
                    await window.supabaseClient.from('user_items').delete().match({
                        user_id: user.id, exam_key: examKey, section_id: toNum(sectionId),
                        question_id: toNum(currentQ.id), item_type: 'bookmark'
                    });
                }
            } else {
                bookmarks.push({
                    ...currentQ, examKey: examKey, examTitle: window.examData[examKey].title, savedAt: new Date().getTime()
                });
                if (user && window.supabaseClient) {
                    await window.supabaseClient.from('user_items').upsert({
                        user_id: user.id, exam_key: examKey, section_id: toNum(sectionId),
                        question_id: toNum(currentQ.id), item_type: 'bookmark'
                    });
                }
            }
            localStorage.setItem(BOOKMARK_KEY, JSON.stringify(bookmarks));
            updateBookmarkUI();
        }

        function readCurrentQuestion() {
            const q = questions[currentIdx];
            const text = `${q.q}. 1번 ${q.options[0]}. 2번 ${q.options[1]}. 3번 ${q.options[2]}. 4번 ${q.options[3]}`;
            window.speakText(text);
        }

        function showQuestion() {
            answered = false;
            const q = questions[currentIdx];
            document.getElementById('q-number').textContent = `문제 ${currentIdx + 1}/${questions.length}`;
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            const progress = ((currentIdx) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;

            updateBookmarkUI();

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            const optionsWithIndices = q.options.map((opt, i) => ({ text: opt, originalIdx: i }));
            shuffleArray(optionsWithIndices);
            shuffledOptions = optionsWithIndices;
            correctOptionIdx = optionsWithIndices.findIndex(opt => opt.originalIdx === q.answer);

            optionsWithIndices.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="shortcut-hint">[${i+1}]</span> ${opt.text}`;
                btn.onclick = () => checkAnswer(i);
                container.appendChild(btn);
            });
        }

        function checkAnswer(idx) {
            if (answered || idx >= shuffledOptions.length) return;
            answered = true;

            const q = questions[currentIdx];
            const buttons = document.querySelectorAll('.option-btn');
            const examTitle = window.examData[examKey].title;
            
            if (idx === correctOptionIdx) {
                buttons[idx].classList.add('correct');
                score++;
                window.saveSolvedQuestion(q, examKey, examTitle);
            } else {
                buttons[idx].classList.add('wrong');
                buttons[correctOptionIdx].classList.add('correct');
                window.saveWrongQuestion(q, examKey, examTitle);
            }

            document.getElementById('explanation-text').textContent = q.exp;
            document.getElementById('explanation-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            clearInterval(timerInterval);
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('final-score').textContent = 
                `총 ${questions.length}문제 중 ${score}문제를 맞혔습니다!`;
            
            document.getElementById('total-time-result').textContent = formatTime(totalElapsed);
            const avg = Math.round(totalElapsed / questions.length);
            document.getElementById('avg-time-result').textContent = `${avg}초`;
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#4f46e5', '#818cf8', '#22c55e', '#ef4444']
            });
        }
    </script>
</body>
</html>
