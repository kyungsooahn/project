<html lang="ko">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시험 학습 모드</title>
    <meta name="google-adsense-account" content="ca-pub-1480804086381400">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1480804086381400"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div style="text-align: left;">
                <h1 id="exam-title" style="font-size: 1.2rem; margin: 0;">시험 로딩중...</h1>
                <small id="section-title" style="color: var(--secondary);"></small>
            </div>
            <a href="index.html" style="text-decoration: none; font-size: 1.5rem;">🏠</a>
        </header>

        <div id="quiz-container">
            <div class="quiz-header">
                <span id="q-number">문제 로딩중...</span>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <button id="bookmark-btn" onclick="toggleBookmark()" class="theme-toggle" title="즐겨찾기" style="background: none; border: 1px solid #ddd; font-size: 1.2rem; padding: 2px 8px;">☆</button>
                    <div class="progress-bar" style="width: 100px;"><div class="progress-fill" id="progress"></div></div>
                </div>
            </div>

            <h2 id="question-text" style="margin-bottom: 2rem; line-height: 1.4; font-size: 1.1rem;">질문 내용</h2>

            <div id="options-container"></div>

            <div class="explanation" id="explanation-box">
                <strong style="display: block; margin-bottom: 0.5rem; color: var(--primary);">💡 정답 및 해설</strong>
                <p id="explanation-text"></p>
            </div>

            <div class="nav-btns">
                <button class="primary" id="next-btn" onclick="nextQuestion()" style="display: none;">다음 문제</button>
            </div>
        </div>

        <div id="result-container" style="display: none; text-align: center; padding: 3rem 1rem;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🏁</div>
            <h2>학습 완료!</h2>
            <p id="final-score" style="font-size: 1.2rem; margin-bottom: 2rem;"></p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="primary" onclick="location.href='index.html'" style="background: var(--secondary);">메인으로</button>
                <button class="primary" onclick="location.reload()">다시 풀기</button>
            </div>
        </div>

        <footer>
            <div class="footer-links">
                <a href="about.html">서비스 소개</a>
                <a href="privacy.html">개인정보처리방침</a>
                <a href="solved.html">맞춘 문제</a>
                <a href="review.html">오답 노트</a>
                <a href="contact.html">문의하기</a>
            </div>
            <p>&copy; 2026 합격 패스. All rights reserved.</p>
        </footer>
    </div>

    <script src="data/cim.js"></script>
    <script src="data/fia.js"></script>
    <script src="data/crea1.js"></script>
    <script src="data/crea2.js"></script>
    <script>
        const WRONG_KEY = 'wrong_questions';
        const SOLVED_KEY = 'solved_questions';
        const PROGRESS_KEY = 'progress_data';
        const BOOKMARK_KEY = 'bookmarked_questions';

        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let answered = false;
        let examKey = '';
        let sectionId = '';

        window.onload = () => {
            const params = new URLSearchParams(location.search);
            examKey = params.get('exam');
            sectionId = params.get('section');

            if (!examKey || !window.examData[examKey]) {
                alert('잘못된 접근입니다.');
                location.href = 'index.html';
                return;
            }

            const examData = window.examData[examKey];
            document.getElementById('exam-title').textContent = examData.title;

            let rawQuestions = [];
            if (sectionId === 'all') {
                document.getElementById('section-title').textContent = "전체 랜덤 학습";
                examData.sections.forEach(s => rawQuestions.push(...s.questions.map(q => ({...q, sectionId: s.id, sectionName: s.name}))));
            } else {
                const section = examData.sections.find(s => s.id === sectionId);
                if (!section) {
                    alert('섹션 정보를 찾을 수 없습니다.');
                    location.href = 'index.html';
                    return;
                }
                document.getElementById('section-title').textContent = section.name;
                rawQuestions = section.questions.map(q => ({...q, sectionId: section.id, sectionName: section.name}));
            }

            // Filter out already answered questions (both solved and wrong)
            const solvedQuestions = JSON.parse(localStorage.getItem(SOLVED_KEY) || '[]');
            const wrongQuestions = JSON.parse(localStorage.getItem(WRONG_KEY) || '[]');
            
            questions = rawQuestions.filter(q => {
                const isSolved = solvedQuestions.some(sq => sq.examKey === examKey && sq.q === q.q);
                const isWrong = wrongQuestions.some(wq => wq.examKey === examKey && wq.q === q.q);
                return !isSolved && !isWrong;
            });

            if (questions.length === 0) {
                if (rawQuestions.length > 0) {
                    alert('해당 섹션의 모든 문제를 학습했습니다! 오답 노트를 확인하거나 초기화 후 다시 시도해주세요.');
                } else {
                    alert('문제가 없습니다.');
                }
                location.href = 'index.html';
                return;
            }

            shuffleArray(questions);
            showQuestion();
        };

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function updateBookmarkUI() {
            const bookmarks = JSON.parse(localStorage.getItem(BOOKMARK_KEY) || '[]');
            const currentQ = questions[currentIdx];
            const isBookmarked = bookmarks.some(b => b.q === currentQ.q && b.examKey === examKey);
            const btn = document.getElementById('bookmark-btn');
            if (btn) {
                btn.innerText = isBookmarked ? '⭐' : '☆';
                btn.style.borderColor = isBookmarked ? 'var(--primary)' : '#ddd';
            }
        }

        function toggleBookmark() {
            const bookmarks = JSON.parse(localStorage.getItem(BOOKMARK_KEY) || '[]');
            const currentQ = questions[currentIdx];
            const foundIdx = bookmarks.findIndex(b => b.q === currentQ.q && b.examKey === examKey);

            if (foundIdx > -1) {
                bookmarks.splice(foundIdx, 1);
            } else {
                bookmarks.push({
                    ...currentQ,
                    examKey: examKey,
                    examTitle: window.examData[examKey].title,
                    savedAt: new Date().getTime()
                });
            }
            localStorage.setItem(BOOKMARK_KEY, JSON.stringify(bookmarks));
            updateBookmarkUI();
        }

        function showQuestion() {
            answered = false;
            const q = questions[currentIdx];
            document.getElementById('q-number').textContent = `문제 ${currentIdx + 1}/${questions.length}`;
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            const progress = ((currentIdx) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;

            updateBookmarkUI();

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${i + 1}. ${opt}`;
                btn.onclick = () => checkAnswer(i);
                container.appendChild(btn);
            });
        }

        function saveWrongQuestion(q) {
            let wrongQuestions = JSON.parse(localStorage.getItem(WRONG_KEY) || '[]');
            const examData = window.examData[examKey];

            if (!wrongQuestions.some(item => item.examKey === examKey && item.q === q.q)) {
                wrongQuestions.push({
                    ...q,
                    examKey: examKey,
                    examTitle: examData.title,
                    savedAt: new Date().toISOString()
                });
                localStorage.setItem(WRONG_KEY, JSON.stringify(wrongQuestions));
            }
        }

        function saveSolvedQuestion(q) {
            let solvedQuestions = JSON.parse(localStorage.getItem(SOLVED_KEY) || '[]');
            const examData = window.examData[examKey];

            if (!solvedQuestions.some(item => item.examKey === examKey && item.q === q.q)) {
                solvedQuestions.push({
                    ...q,
                    examKey: examKey,
                    examTitle: examData.title,
                    savedAt: new Date().toISOString()
                });
                localStorage.setItem(SOLVED_KEY, JSON.stringify(solvedQuestions));
            }
            
            // Update counts for index.html progress bars
            let progress = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
            const key = `${examKey}_${q.sectionId}`;
            if (!progress[key]) progress[key] = 0;
            progress[key] += 1;
            localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
        }

        function checkAnswer(idx) {
            if (answered) return;
            answered = true;

            const q = questions[currentIdx];
            const buttons = document.querySelectorAll('.option-btn');
            
            if (idx === q.answer) {
                buttons[idx].classList.add('correct');
                score++;
                saveSolvedQuestion(q);
            } else {
                buttons[idx].classList.add('wrong');
                buttons[q.answer].classList.add('correct');
                saveWrongQuestion(q);
            }

            document.getElementById('explanation-text').textContent = q.exp;
            document.getElementById('explanation-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('final-score').textContent = 
                `총 ${questions.length}문제 중 ${score}문제를 맞혔습니다!`;
        }
    </script>
</body>
</html>
