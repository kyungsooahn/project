<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="display: flex; flex-direction: column;"><a href="index.html" class="lite-logo">LI<span>TE</span></a><div class="lite-tagline">License Is Talent</div></div>

    <script>
        const BOOKMARK_KEY = 'bookmarked_questions';

        function getGroupedBookmarks() {
            const bookmarks = JSON.parse(localStorage.getItem(BOOKMARK_KEY) || '[]');
            const groups = {};
            bookmarks.forEach((q, index) => {
                const title = q.examTitle || '기타';
                if (!groups[title]) groups[title] = [];
                groups[title].push({ ...q, originalIndex: index });
            });
            return groups;
        }

        function renderBookmarks() {
            const container = document.getElementById('bookmark-list-container');
            const groups = getGroupedBookmarks();
            
            if (Object.keys(groups).length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">⭐</div>
                        <p>즐겨찾기한 문제가 없습니다.<br>학습 중에 중요한 문제를 별표로 표시해보세요.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            for (const title in groups) {
                html += `
                    <div class="section-group">
                        <div class="section-header"><h2>📌 ${title}</h2></div>
                `;
                groups[title].forEach(q => {
                    const optionsHtml = q.options.map((opt, i) => `
                        <div style="margin: 0.25rem 0; padding: 0.5rem; border-radius: 0.25rem; background: ${i === q.answer ? 'rgba(79, 70, 229, 0.05)' : 'transparent'}; border: 1px solid ${i === q.answer ? 'var(--primary)' : '#eee'}">
                            ${i + 1}. ${opt} ${i === q.answer ? '✅' : ''}
                        </div>
                    `).join('');

                    html += `
                        <div class="wrong-item">
                            <span class="wrong-q">${q.q}</span>
                            <div class="options">${optionsHtml}</div>
                            <div style="margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.03); border-radius: 0.5rem; font-size: 0.9rem;">
                                <strong>💡 해설:</strong> ${q.exp}
                            </div>
                            <button class="delete-btn" onclick="deleteBookmark(${q.originalIndex})">즐겨찾기 해제</button>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        async function deleteBookmark(idx) {
            let bookmarks = JSON.parse(localStorage.getItem(BOOKMARK_KEY) || '[]');
            const item = bookmarks[idx];
            
            const user = await window.checkUser();
            if (user && window.supabaseClient && item) {
                await window.supabaseClient.from('user_items').delete().match({
                    user_id: user.id, exam_key: item.examKey, section_id: parseInt(item.sectionId),
                    question_id: parseInt(item.id), item_type: 'bookmark'
                });
            }

            bookmarks.splice(idx, 1);
            localStorage.setItem(BOOKMARK_KEY, JSON.stringify(bookmarks));
            renderBookmarks();
        }

        renderBookmarks();
    </script>
</body>
