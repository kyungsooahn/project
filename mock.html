<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G99S2G82RN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-G99S2G82RN');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실전 모의고사 - 합격 패스</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .timer-box {
            position: sticky;
            top: 0;
            background: var(--primary);
            color: white;
            padding: 0.5rem;
            text-align: center;
            font-weight: bold;
            z-index: 100;
            border-radius: 0 0 1rem 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .question-nav {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-top: 2rem;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.02);
            border-radius: 0.5rem;
        }
        .nav-dot {
            padding: 5px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .nav-dot.active { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-dot.answered { background: var(--secondary); color: white; }
        
        .mock-result-item {
            margin-bottom: 2rem;
            padding: 1.5rem;
            border-radius: 0.5rem;
            background: var(--card);
            border-left: 5px solid #ddd;
        }
        .mock-result-item.correct { border-left-color: var(--success); }
        .mock-result-item.wrong { border-left-color: var(--danger); }
        
        .option-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .intermission-container {
            text-align: center;
            padding: 3rem 1rem;
            background: var(--card);
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div id="timer-display" class="timer-box">남은 시간 --:--</div>
    
    <div class="container">
        <header>
            <div style="text-align: left;">
                <h1 id="exam-title" style="font-size: 1.2rem; margin: 0;">모의고사 로딩중...</h1>
                <small id="section-title" style="color: var(--secondary);"></small>
            </div>
            <a href="index.html" style="text-decoration: none; font-size: 1.5rem;">🏠</a>
        </header>

        <!-- 시험 진행 컨테이너 -->
        <div id="quiz-container">
            <div class="quiz-header">
                <span id="q-number">문제 로딩중...</span>
                <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            </div>

            <h2 id="question-text" style="margin-bottom: 2rem; line-height: 1.4; font-size: 1.1rem;">질문 내용</h2>
            <div id="options-container"></div>

            <div class="nav-btns" style="margin-top: 2rem; display: flex; justify-content: space-between;">
                <button class="secondary" onclick="prevQuestion()">이전</button>
                <button class="primary" id="next-btn" onclick="nextQuestion()">다음</button>
                <button class="primary" id="submit-btn" onclick="confirmSubmit()" style="background: var(--danger); display: none;">파트 종료</button>
            </div>

            <div class="question-nav" id="q-nav"></div>
        </div>

        <!-- 휴식/다음 파트 대기 컨테이너 -->
        <div id="intermission-container" style="display: none;" class="intermission-container">
            <h2 id="intermission-title">1교시 종료</h2>
            <p id="intermission-desc" style="margin: 1.5rem 0; line-height: 1.6;">잠시 휴식을 취하신 후,<br>아래 버튼을 눌러 다음 교시를 시작하세요.</p>
            <button class="primary" onclick="startNextPart()" style="padding: 1rem 2rem; font-size: 1.1rem;">다음 교시 시작하기</button>
        </div>

        <!-- 최종 결과 컨테이너 -->
        <div id="result-container" style="display: none;">
            <div style="text-align: center; margin-bottom: 3rem;">
                <h2>📊 전체 시험 결과</h2>
                <div id="score-circle" style="font-size: 3rem; font-weight: bold; color: var(--primary); margin: 1rem 0;">0점</div>
                <p id="result-summary"></p>
                <button class="primary" onclick="location.href='index.html'">메인으로 돌아가기</button>
            </div>
            <hr>
            <h3>상세 해설 (전과목)</h3>
            <div id="detail-review"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const examKey = urlParams.get('exam');
        const sectionId = urlParams.get('section');

        let examParts = []; // [{qs: [], time: seconds, name: ""}]
        let currentPartIdx = 0;
        
        let questions = []; // 현재 파트의 문제들
        let userAnswers = []; // 현재 파트의 유저 답안
        let accumulatedResults = []; // [{q: {}, userA: idx}] - 전체 결과 저장용
        
        let currentIdx = 0;
        let timeLeft = 0;
        let timerInterval;

        if (examKey) {
            const dataScript = document.createElement('script');
            dataScript.src = `data/${examKey}.js`;
            dataScript.onload = () => init();
            dataScript.onerror = () => { alert('데이터 로드 실패'); location.href='index.html'; };
            document.head.appendChild(dataScript);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function init() {
            const exam = window.examData[examKey];
            document.getElementById('exam-title').innerText = exam.title;

            if (sectionId) {
                // 특정 과목 단독 모드
                const section = exam.sections.find(s => s.id === sectionId);
                examParts = [{
                    qs: [...section.questions],
                    time: section.questions.length * 90,
                    name: section.name
                }];
            } else {
                // 자격증 통합 모드 설정
                if (examKey === 'cim') {
                    examParts = [{
                        qs: [...shuffle([...exam.sections[0].questions]).slice(0, 20),
                             ...shuffle([...exam.sections[1].questions]).slice(0, 30),
                             ...shuffle([...exam.sections[2].questions]).slice(0, 50)],
                        time: 120 * 60,
                        name: "전과목 통합 실전"
                    }];
                } else if (examKey === 'fia') {
                    examParts = [{
                        qs: [...shuffle([...exam.sections[0].questions]).slice(0, 25),
                             ...shuffle([...exam.sections[1].questions]).slice(0, 35),
                             ...shuffle([...exam.sections[2].questions]).slice(0, 20),
                             ...shuffle([...exam.sections[3].questions]).slice(0, 20)],
                        time: 120 * 60,
                        name: "전과목 통합 실전"
                    }];
                } else if (examKey === 'crea1') {
                    examParts = [{
                        qs: [...shuffle([...exam.sections[0].questions]).slice(0, 40),
                             ...shuffle([...exam.sections[1].questions]).slice(0, 40)],
                        time: 100 * 60,
                        name: "1차 통합 실전"
                    }];
                } else if (examKey === 'crea2') {
                    // 공인중개사 2차: 2단계 분할 모드
                    examParts = [
                        {
                            qs: [...shuffle([...exam.sections[0].questions]).slice(0, 40),
                                 ...shuffle([...exam.sections[1].questions]).slice(0, 40)],
                            time: 100 * 60,
                            name: "1교시 (중개사법, 공법)"
                        },
                        {
                            qs: [...shuffle([...exam.sections[2].questions]).slice(0, 40)],
                            time: 50 * 60,
                            name: "2교시 (공시/세법)"
                        }
                    ];
                } else {
                    // 기본 통합 로직
                    let allQs = [];
                    exam.sections.forEach(s => {
                        allQs = allQs.concat(shuffle([...s.questions]).slice(0, 20));
                    });
                    examParts = [{ qs: allQs, time: allQs.length * 90, name: "통합 모의고사" }];
                }
            }
            
            loadPart(0);
        }

        function loadPart(idx) {
            currentPartIdx = idx;
            const part = examParts[idx];
            questions = part.qs;
            userAnswers = new Array(questions.length).fill(null);
            currentIdx = 0;
            timeLeft = part.time;
            
            document.getElementById('section-title').innerText = part.name;
            document.getElementById('intermission-container').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('timer-display').style.display = 'block';
            
            startTimer();
            renderNav();
            showQuestion();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                document.getElementById('timer-display').innerText = `남은 시간 ${min}:${sec < 10 ? '0'+sec : sec}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert('시간이 종료되었습니다. 현재 파트가 자동으로 종료됩니다.');
                    finishPart();
                }
            }, 1000);
        }

        function renderNav() {
            const nav = document.getElementById('q-nav');
            nav.innerHTML = '';
            questions.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `nav-dot ${userAnswers[i] !== null ? 'answered' : ''} ${i === currentIdx ? 'active' : ''}`;
                dot.innerText = i + 1;
                dot.onclick = () => { currentIdx = i; showQuestion(); };
                nav.appendChild(dot);
            });
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-number').innerText = `문제 ${currentIdx + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
                btn.innerText = opt;
                btn.onclick = () => selectOption(i);
                container.appendChild(btn);
            });

            document.getElementById('next-btn').style.display = currentIdx === questions.length - 1 ? 'none' : 'block';
            document.getElementById('submit-btn').style.display = currentIdx === questions.length - 1 ? 'block' : 'none';
            renderNav();
        }

        function selectOption(idx) {
            userAnswers[currentIdx] = idx;
            showQuestion();
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                showQuestion();
            }
        }

        function confirmSubmit() {
            const unanswered = userAnswers.filter(a => a === null).length;
            const msg = unanswered > 0 
                ? `${unanswered}문제를 풀지 않았습니다. 현재 파트를 종료하시겠습니까?`
                : '현재 파트를 제출하시겠습니까?';
            if (confirm(msg)) finishPart();
        }

        function finishPart() {
            clearInterval(timerInterval);
            
            // 현재 파트 결과 저장
            questions.forEach((q, i) => {
                accumulatedResults.push({ q: q, userA: userAnswers[i] });
            });

            if (currentPartIdx < examParts.length - 1) {
                // 다음 파트가 있는 경우
                document.getElementById('quiz-container').style.display = 'none';
                document.getElementById('timer-display').style.display = 'none';
                document.getElementById('intermission-container').style.display = 'block';
                document.getElementById('intermission-title').innerText = `${examParts[currentPartIdx].name} 종료`;
            } else {
                // 모든 파트가 끝난 경우
                showFinalResults();
            }
        }

        function startNextPart() {
            loadPart(currentPartIdx + 1);
        }

        function showFinalResults() {
            document.getElementById('timer-display').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('intermission-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';

            let correctCount = 0;
            const reviewContainer = document.getElementById('detail-review');
            reviewContainer.innerHTML = '';

            accumulatedResults.forEach((res, i) => {
                const q = res.q;
                const isCorrect = res.userA === q.answer;
                if (isCorrect) correctCount++;

                const item = document.createElement('div');
                item.className = `mock-result-item ${isCorrect ? 'correct' : 'wrong'}`;
                item.innerHTML = `
                    <p><strong>Q${i+1}. ${q.q}</strong></p>
                    <p>내 정답: ${res.userA !== null ? q.options[res.userA] : '미선택'} ${isCorrect ? '✅' : '❌'}</p>
                    <p style="color: var(--primary);">실제 정답: ${q.options[q.answer]}</p>
                    <div style="font-size: 0.9rem; margin-top: 10px; padding: 10px; background: #f8f9fa;">
                        💡 해설: ${q.exp}
                    </div>
                `;
                reviewContainer.appendChild(item);
            });

            const score = Math.round((correctCount / accumulatedResults.length) * 100);
            document.getElementById('score-circle').innerText = `${score}점`;
            document.getElementById('result-summary').innerText = `총 ${accumulatedResults.length}문제 중 ${correctCount}문제를 맞혔습니다.`;
        }
    </script>
</body>
</html>
