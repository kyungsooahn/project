<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 대시보드 📊</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --card-bg: #ffffff;
            --stats-primary: #4f46e5;
            --stats-secondary: #10b981;
            --stats-accent: #f59e0b;
            --stats-danger: #ef4444;
        }
        [data-theme="dark"] {
            --card-bg: #1e293b;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
            border-bottom: 4px solid var(--stats-primary);
        }
        .kpi-card:nth-child(2) { border-color: var(--stats-secondary); }
        .kpi-card:nth-child(3) { border-color: var(--stats-accent); }
        .kpi-card:nth-child(4) { border-color: var(--stats-danger); }

        .kpi-val { display: block; font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 0.25rem; }
        .kpi-label { font-size: 0.85rem; color: var(--secondary); font-weight: 600; }

        .main-stats-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        @media (max-width: 768px) {
            .main-stats-row { grid-template-columns: 1fr; }
        }

        .chart-container {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .subject-breakdown {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .subject-card {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #eee;
        }
        .subject-card:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .subject-name { font-weight: bold; font-size: 1.1rem; }
        .subject-pct { font-weight: 800; color: var(--stats-primary); }

        .section-mini-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .section-mini-item {
            font-size: 0.75rem;
            padding: 0.5rem;
            background: rgba(0,0,0,0.02);
            border-radius: 0.4rem;
        }
        .mini-progress {
            height: 4px;
            background: #eee;
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        .mini-progress-fill { height: 100%; background: var(--stats-secondary); transition: width 0.3s; }

        .mastery-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="index.html" style="text-decoration: none; font-size: 1.5rem;">🏠</a>
                <h1 style="margin: 0;">📊 학습 대시보드</h1>
            </div>
        </header>

        <!-- 상단 요약 카드 -->
        <div class="dashboard-grid">
            <div class="kpi-card">
                <span class="kpi-val" id="kpi-total">0</span>
                <span class="kpi-label">푼 문제 수</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-val" id="kpi-accuracy">0%</span>
                <span class="kpi-label">전체 정답률</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-val" id="kpi-bookmarks">0</span>
                <span class="kpi-label">즐겨찾기</span>
            </div>
            <div class="kpi-card">
                <span class="kpi-val" id="kpi-remains">0</span>
                <span class="kpi-label">남은 문제</span>
            </div>
        </div>

        <div class="main-stats-row">
            <!-- 레이더 차트 -->
            <div class="chart-container">
                <h3 style="margin-top:0; font-size:1rem; color:var(--primary);">과목별 밸런스</h3>
                <canvas id="radarChart"></canvas>
            </div>
            
            <!-- 과목별 상세 분석 -->
            <div class="subject-breakdown">
                <h3 style="margin-top:0; font-size:1rem; color:var(--primary);">자격증별 마스터리</h3>
                <div id="subject-list"></div>
            </div>
        </div>

        <footer>
            <div class="footer-links">
                <a href="about.html">서비스 소개</a>
                <a href="privacy.html">개인정보처리방침</a>
                <a href="solved.html">맞춘 문제</a>
                <a href="review.html">오답 노트</a>
                <a href="bookmarks.html">즐겨찾기</a>
                <a href="contact.html">문의하기</a>
            </div>
            <p>&copy; 2026 합격 패스. All rights reserved.</p>
        </footer>
    </div>

    <script src="data/cim.js"></script>
    <script src="data/fia.js"></script>
    <script src="data/crea1.js"></script>
    <script src="data/crea2.js"></script>
    <script>
        const WRONG_KEY = 'wrong_questions';
        const PROGRESS_KEY = 'progress_data';
        const BOOKMARK_KEY = 'bookmarked_questions';
        const SOLVED_KEY = 'solved_questions';

        function getMastery(pct) {
            if (pct >= 90) return { label: '마스터', color: '#7c3aed', bg: '#f5f3ff' };
            if (pct >= 70) return { label: '합격권', color: '#059669', bg: '#ecfdf5' };
            if (pct >= 40) return { label: '숙련', color: '#d97706', bg: '#fffbeb' };
            if (pct > 0) return { label: '입문', color: '#4b5563', bg: '#f9fafb' };
            return { label: '시작전', color: '#9ca3af', bg: '#f3f4f6' };
        }

        function renderDashboard() {
            const wrongs = JSON.parse(localStorage.getItem(WRONG_KEY) || '[]');
            const solved = JSON.parse(localStorage.getItem(SOLVED_KEY) || '[]');
            const bookmarks = JSON.parse(localStorage.getItem(BOOKMARK_KEY) || '[]');
            const progress = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');

            const totalSolvedCount = solved.length;
            const totalWrongCount = wrongs.length;
            const totalAttempted = totalSolvedCount + totalWrongCount;
            const accuracy = totalAttempted > 0 ? Math.round((totalSolvedCount / totalAttempted) * 100) : 0;

            document.getElementById('kpi-total').innerText = totalAttempted.toLocaleString();
            document.getElementById('kpi-accuracy').innerText = `${accuracy}%`;
            document.getElementById('kpi-bookmarks').innerText = bookmarks.length;

            const subjectList = document.getElementById('subject-list');
            const radarLabels = [];
            const radarValues = [];
            let globalTotalQuestions = 0;

            for (let key in window.examData) {
                const exam = window.examData[key];
                let examCorrect = 0;
                let examTotal = 0;

                const subjectCard = document.createElement('div');
                subjectCard.className = 'subject-card';

                let sectionsHtml = '<div class="section-mini-grid">';
                exam.sections.forEach(s => {
                    const sCorrect = progress[`${key}_${s.id}`] || 0;
                    const sTotal = s.questions ? s.questions.length : 0;
                    const sPct = sTotal > 0 ? Math.round((sCorrect / sTotal) * 100) : 0;
                    examCorrect += sCorrect;
                    examTotal += sTotal;
                    
                    sectionsHtml += `
                        <div class="section-mini-item">
                            <div style="display:flex; justify-content:space-between;">
                                <span>${s.name}</span>
                                <span>${sPct}%</span>
                            </div>
                            <div class="mini-progress"><div class="mini-progress-fill" style="width:${sPct}%"></div></div>
                        </div>
                    `;
                });
                sectionsHtml += '</div>';

                globalTotalQuestions += examTotal;
                const examPct = examTotal > 0 ? Math.round((examCorrect / examTotal) * 100) : 0;
                const mastery = getMastery(examPct);

                radarLabels.push(exam.title);
                radarValues.push(examPct);

                subjectCard.innerHTML = `
                    <div class="subject-header">
                        <div>
                            <span class="subject-name">${exam.title}</span>
                            <span class="mastery-badge" style="color:${mastery.color}; background:${mastery.bg}">${mastery.label}</span>
                        </div>
                        <span class="subject-pct">${examPct}%</span>
                    </div>
                    <div class="mini-progress" style="height:8px; margin-bottom:1rem;"><div class="mini-progress-fill" style="width:${examPct}%; background:var(--stats-primary)"></div></div>
                    ${sectionsHtml}
                `;
                subjectList.appendChild(subjectCard);
            }

            document.getElementById('kpi-remains').innerText = (globalTotalQuestions - totalSolvedCount).toLocaleString();
            initRadarChart(radarLabels, radarValues);
        }

        function initRadarChart(labels, values) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '완성도',
                        data: values,
                        backgroundColor: 'rgba(79, 70, 229, 0.2)',
                        borderColor: '#4f46e5',
                        borderWidth: 2,
                        pointBackgroundColor: '#4f46e5'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            suggestMin: 0,
                            suggestMax: 100,
                            ticks: { display: false, stepSize: 20 },
                            grid: { color: isDark ? '#334155' : '#e2e8f0' },
                            angleLines: { color: isDark ? '#334155' : '#e2e8f0' },
                            pointLabels: { color: isDark ? '#94a3b8' : '#64748b', font: { size: 11, weight: 'bold' } }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        window.addEventListener('DOMContentLoaded', renderDashboard);
    </script>
</body>
</html>
