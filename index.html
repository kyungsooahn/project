<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자자산운용사(CIM) 합격 노드 📝</title>

<style>
:root {
  --bg-color: #f8f9fa;
  --text-color: #212529;
  --card-bg: #ffffff;
  --primary-color: #007bff;
  --success-color: #28a745;
  --danger-color: #dc3545;
  --border-color: #dee2e6;
}

[data-theme="dark"] {
  --bg-color: #121212;
  --text-color: #e9ecef;
  --card-bg: #1e1e1e;
  --primary-color: #375a7f;
  --border-color: #444;
}

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
  background-color: var(--bg-color);
  color: var(--text-color);
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
  transition: all 0.3s ease;
}

.container {
  width: 100%;
  max-width: 600px;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.theme-toggle {
  background: none;
  border: 1px solid var(--border-color);
  color: var(--text-color);
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
}

.quiz-card {
  background-color: var(--card-bg);
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  border: 1px solid var(--border-color);
  margin-bottom: 20px;
}

.question-num {
  font-size: 0.9rem;
  color: var(--primary-color);
  font-weight: bold;
  margin-bottom: 10px;
}

.question-text {
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 20px;
  line-height: 1.5;
}

.options-list {
  list-style: none;
  padding: 0;
}

.option-item {
  padding: 15px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: background-color 0.2s;
}

.option-item:hover {
  background-color: rgba(0, 123, 255, 0.05);
}

.option-item.correct {
  background-color: rgba(40, 167, 69, 0.2);
  border-color: var(--success-color);
}

.option-item.wrong {
  background-color: rgba(220, 53, 69, 0.2);
  border-color: var(--danger-color);
}

.explanation {
  margin-top: 20px;
  padding: 15px;
  background-color: rgba(0,0,0,0.03);
  border-radius: 8px;
  display: none;
  font-size: 0.95rem;
  line-height: 1.6;
}

.next-btn {
  width: 100%;
  padding: 15px;
  background-color: var(--primary-color);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  display: none;
}

.score-screen {
  text-align: center;
  display: none;
}

.restart-btn {
  margin-top: 20px;
  padding: 10px 20px;
  background-color: var(--success-color);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h2>📖 투운사 벼락치기</h2>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
  </header>

  <div id="quiz-area">
    <div class="quiz-card">
      <div class="question-num" id="q-num">문제 1/3</div>
      <div class="question-text" id="q-text">질문 내용이 여기에 표시됩니다.</div>
      <div class="options-list" id="options">
        <!-- 보기가 여기에 생성됩니다 -->
      </div>
      <div class="explanation" id="explanation">
        <strong>💡 해설:</strong> <span id="exp-text"></span>
      </div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제</button>
  </div>

  <div class="score-screen" id="score-screen">
    <h3>🎉 학습 완료!</h3>
    <p id="final-score">당신의 점수는 0/0입니다.</p>
    <button class="restart-btn" onclick="initQuiz()">다시 풀기</button>
  </div>
</div>

<script>
const quizData = [
  {
    question: "자본시장법상 전문투자자에 해당하지 않는 것은?",
    options: ["국가", "한국은행", "지방자치단체", "모든 일반법인"],
    answer: 3,
    explanation: "일반법인은 별도의 요건(금융투자상품 잔고 등)을 갖추어 지정 절차를 거쳐야 전문투자자가 될 수 있습니다. 모든 일반법인이 당연히 전문투자자인 것은 아닙니다."
  },
  {
    question: "다음 중 파생상품의 위험 지표인 '델타(Delta)'의 의미는?",
    options: ["기초자산 가격 변화에 따른 옵션 가격 변화", "시간 경과에 따른 옵션 가격 변화", "변동성 변화에 따른 옵션 가격 변화", "이자율 변화에 따른 옵션 가격 변화"],
    answer: 0,
    explanation: "델타는 기초자산 가격이 1단위 변할 때 옵션 가격이 얼마나 변하는지를 나타내는 지표입니다."
  },
  {
    question: "투자자산운용사의 직무윤리 중 '신의성실의 원칙'에 대한 설명으로 옳은 것은?",
    options: ["자신의 이익을 최우선으로 해야 한다.", "고객의 이익을 보호하기 위해 최선을 다해야 한다.", "법규만 준수하면 윤리적 책임은 없다.", "회사의 이익을 위해 고객 정보를 활용할 수 있다."],
    answer: 1,
    explanation: "신의성실의 원칙은 금융소비자의 이익을 보호하기 위해 선량한 관리자의 주의의무를 다해야 함을 의미합니다."
  }
];

let currentIdx = 0;
let score = 0;
let answered = false;

function initQuiz() {
  currentIdx = 0;
  score = 0;
  document.getElementById("quiz-area").style.display = "block";
  document.getElementById("score-screen").style.display = "none";
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = quizData[currentIdx];
  document.getElementById("q-num").textContent = `문제 ${currentIdx + 1}/${quizData.length}`;
  document.getElementById("q-text").textContent = q.question;
  document.getElementById("explanation").style.display = "none";
  document.getElementById("next-btn").style.display = "none";
  
  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";
  
  q.options.forEach((opt, i) => {
    const div = document.createElement("div");
    div.className = "option-item";
    div.textContent = `${i + 1}. ${opt}`;
    div.onclick = () => checkAnswer(i);
    optionsDiv.appendChild(div);
  });
}

function checkAnswer(idx) {
  if (answered) return;
  answered = true;
  
  const q = quizData[currentIdx];
  const items = document.querySelectorAll(".option-item");
  
  if (idx === q.answer) {
    items[idx].classList.add("correct");
    score++;
  } else {
    items[idx].classList.add("wrong");
    items[q.answer].classList.add("correct");
  }
  
  document.getElementById("exp-text").textContent = q.explanation;
  document.getElementById("explanation").style.display = "block";
  document.getElementById("next-btn").style.display = "block";
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx < quizData.length) {
    showQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById("quiz-area").style.display = "none";
  document.getElementById("score-screen").style.display = "block";
  document.getElementById("final-score").textContent = `총 ${quizData.length}문제 중 ${score}문제를 맞혔습니다!`;
}

function toggleTheme() {
  const body = document.body;
  const btn = document.getElementById("theme-btn");
  if (body.getAttribute("data-theme") === "dark") {
    body.removeAttribute("data-theme");
    btn.textContent = "🌙";
  } else {
    body.setAttribute("data-theme", "dark");
    btn.textContent = "☀️";
  }
}

// 초기화
initQuiz();
</script>

</body>
</html>
