<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>합격 패스 - 1000제 마스터 🎓</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .section-list {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .section-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: rgba(0,0,0,0.03);
            border-radius: 0.5rem;
            text-decoration: none;
            color: inherit;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .section-item:hover {
            background: var(--primary);
            color: white;
        }
        .badge {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }
        .section-item:hover .badge {
            background: white;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 합격 패스 1000</h1>
            <div style="display: flex; gap: 0.5rem;">
                <button onclick="location.href='review.html'" class="theme-toggle" title="오답 노트">📝</button>
                <button onclick="toggleTheme()" class="theme-toggle">🌙</button>
            </div>
        </header>

        <section id="exam-grid" class="grid"></section>
    </div>

    <script src="questions.js"></script>
    <script>
        function renderExams() {
            const grid = document.getElementById('exam-grid');
            grid.innerHTML = '';
            for (let key in window.examData) {
                const exam = window.examData[key];
                const totalQ = exam.sections.reduce((acc, s) => acc + s.questions.length, 0);
                
                const card = document.createElement('div');
                card.className = 'exam-card';
                card.style.cursor = 'default';
                
                let sectionsHtml = exam.sections.map(s => `
                    <a href="quiz.html?exam=${key}&section=${s.id}" class="section-item">
                        <span>${s.name}</span>
                        <span class="badge">${s.questions.length}</span>
                    </a>
                `).join('');

                card.innerHTML = `
                    <h3>${exam.title}</h3>
                    <p>총 ${totalQ}문항 반복 학습</p>
                    <div class="section-list">
                        <a href="quiz.html?exam=${key}&section=all" class="section-item" style="font-weight: bold; background: rgba(79, 70, 229, 0.1);">
                            <span>전체 랜덤 풀기</span>
                            <span class="badge">ALL</span>
                        </a>
                        ${sectionsHtml}
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
        }

        renderExams();
    </script>
</body>
</html>
