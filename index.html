<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금융/부동산 자격증 합격 패스 🎓</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 합격 패스</h1>
            <button onclick="toggleTheme()" class="theme-toggle">🌙</button>
        </header>

        <section>
            <h2 style="margin-bottom: 2rem;">준비하실 시험을 선택하세요</h2>
            <div class="grid">
                <a href="quiz.html?exam=cim" class="exam-card">
                    <h3>📈 투자자산운용사</h3>
                    <p>집합투자재산, 신탁재산 또는 투자자문자산을 운용하는 전문가</p>
                </a>
                <a href="quiz.html?exam=fia" class="exam-card">
                    <h3>📊 금융투자분석사</h3>
                    <p>금융투자상품의 가치를 분석하여 투자판단을 제공하는 전문가</p>
                </a>
                <a href="quiz.html?exam=crea" class="exam-card">
                    <h3>🏠 공인중개사</h3>
                    <p>부동산 중개대상물에 대하여 거래당사자간의 매매·교환·임대차 기타 권리의 득실변경에 관한 행위를 알선·중개하는 전문가</p>
                </a>
            </div>
        </section>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            if (current === 'dark') {
                body.removeAttribute('data-theme');
                document.querySelector('.theme-toggle').textContent = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                document.querySelector('.theme-toggle').textContent = '☀️';
            }
        }
    </script>
</body>
</html>
