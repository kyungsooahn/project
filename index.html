<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 추첨기 🎰</title>

<style>
:root {
  --bg-color: #eef6ff;
  --text-color: #333;
  --container-bg: transparent;
  --button-bg: #ff5a3c;
  --button-hover: #e04b30;
  --machine-gradient-start: #ffffff;
  --machine-gradient-end: #d9e6ff;
  --machine-border: #777;
  --toggle-btn-bg: #ddd;
  --toggle-btn-text: #333;
}

[data-theme="dark"] {
  --bg-color: #1a1a1a;
  --text-color: #f0f0f0;
  --container-bg: #2a2a2a;
  --button-bg: #ff7b63;
  --button-hover: #ff5a3c;
  --machine-gradient-start: #3a3a3a;
  --machine-gradient-end: #1a1a1a;
  --machine-border: #555;
  --toggle-btn-bg: #444;
  --toggle-btn-text: #fff;
}

body {
  font-family: Arial, sans-serif;
  background-color: var(--bg-color);
  color: var(--text-color);
  text-align: center;
  margin: 0;
  padding: 40px;
  transition: background-color 0.3s, color 0.3s;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
  background-color: var(--container-bg);
  border-radius: 16px;
  transition: background-color 0.3s;
}

.theme-toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background-color: var(--toggle-btn-bg);
  color: var(--toggle-btn-text);
  cursor: pointer;
  font-weight: bold;
  transition: background-color 0.3s, color 0.3s;
}

button.draw-btn {
  padding: 14px 28px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background-color: var(--button-bg);
  color: white;
  cursor: pointer;
  transition: background-color 0.3s;
}

button.draw-btn:hover {
  background-color: var(--button-hover);
}

.machine {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  margin: 30px auto;
  background: radial-gradient(circle at 30% 30%, var(--machine-gradient-start), var(--machine-gradient-end));
  border: 6px solid var(--machine-border);
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}

.mixing-ball {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  position: absolute;
  animation: spin 2s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg) translateX(80px) rotate(0deg); }
  100% { transform: rotate(360deg) translateX(80px) rotate(-360deg); }
}

.result-set {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px;
  flex-wrap: wrap;
}

.ball {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 18px;
  color: #333;
  background: gold;
  animation: pop 0.5s ease;
}

@keyframes pop {
  0% { transform: scale(0); }
  80% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">다크 모드 🌙</button>

<div class="container">
  <h1>🎰 로또 추첨기</h1>
  <p>실제 추첨기처럼 공이 섞인 후 번호가 나옵니다</p>
  <button class="draw-btn" onclick="startDraw()">추첨 시작</button>
  <div class="machine" id="machine"></div>
  <div id="results"></div>
</div>

<script>
function toggleTheme() {
  const body = document.body;
  const btn = document.getElementById("theme-btn");
  const currentTheme = body.getAttribute("data-theme");
  
  if (currentTheme === "dark") {
    body.removeAttribute("data-theme");
    btn.textContent = "다크 모드 🌙";
  } else {
    body.setAttribute("data-theme", "dark");
    btn.textContent = "일반 모드 ☀️";
  }
}

function getLottoNumbers() {
  let set = new Set();
  while (set.size < 6) {
    set.add(Math.floor(Math.random() * 45) + 1);
  }
  return [...set].sort((a, b) => a - b);
}

function randomColor() {
  const colors = ["#ffd700", "#ff6b6b", "#6bcB77", "#4d96ff", "#ff9f1c"];
  return colors[Math.floor(Math.random() * colors.length)];
}

function createMixingBalls() {
  const machine = document.getElementById("machine");
  machine.innerHTML = "";
  for (let i = 0; i < 10; i++) {
    let ball = document.createElement("div");
    ball.className = "mixing-ball";
    ball.style.background = randomColor();
    ball.style.left = "100px";
    ball.style.top = "100px";
    ball.style.animationDuration = (1.5 + Math.random()) + "s";
    machine.appendChild(ball);
  }
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function startDraw() {
  const results = document.getElementById("results");
  results.innerHTML = "";
  for (let s = 0; s < 5; s++) {
    createMixingBalls();
    await sleep(2000);
    const nums = getLottoNumbers();
    const setDiv = document.createElement("div");
    setDiv.className = "result-set";
    results.appendChild(setDiv);
    for (let n of nums) {
      await sleep(500);
      let ball = document.createElement("div");
      ball.className = "ball";
      ball.style.background = randomColor();
      ball.textContent = n;
      setDiv.appendChild(ball);
    }
    await sleep(800);
  }
}
</script>

</body>
</html>
